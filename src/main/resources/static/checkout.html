<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - BookHaven</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-book-open"></i>
            <span>BookHaven</span>
        </div>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> Home</a>
            <a href="/cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="badge">0</span></a>
        </div>
    </nav>

    <main class="container">
        <div id="checkout-content" class="checkout-content">
            <div class="checkout-form-wrapper">
                <h1><i class="fas fa-credit-card"></i> Checkout</h1>
                <p class="subtitle">Complete your order</p>

                <div id="order-summary" class="order-summary">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading summary...</div>
                </div>

                <form id="checkout-form" class="checkout-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" required placeholder="john@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" required placeholder="123 Main Street">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" required placeholder="New York">
                        </div>
                        <div class="form-group">
                            <label>ZIP Code</label>
                            <input type="text" required placeholder="10001">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" required placeholder="**** **** **** ****" maxlength="19">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" required placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" required placeholder="***" maxlength="3">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary btn-large">
                        <i class="fas fa-lock"></i> Place Order
                    </button>
                </form>
            </div>
        </div>

        <div id="success-message" class="success-message" style="display:none;">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2>Order Confirmed!</h2>
            <p>Thank you for your purchase. Your order has been placed successfully.</p>
            <div class="order-details">
                <p><strong>Order ID:</strong> <span id="order-id"></span></p>
                <p><strong>Total:</strong> <span id="order-total"></span></p>
            </div>
            <a href="/" class="btn-primary"><i class="fas fa-home"></i> Continue Shopping</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 BookHaven. Built with Spring Boot & Java.</p>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="/js/app.js"></script>
</body>
</html>
