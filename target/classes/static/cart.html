<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - BookHaven</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-book-open"></i>
            <span>BookHaven</span>
        </div>
        <div class="nav-links">
            <a href="/"><i class="fas fa-home"></i> Home</a>
            <a href="/cart.html" class="active"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="badge">0</span></a>
        </div>
    </nav>

    <main class="container">
        <h1 class="page-title"><i class="fas fa-shopping-cart"></i> Your Cart</h1>

        <div id="cart-content" class="cart-content">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading cart...</div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 BookHaven. Built with Spring Boot & Java.</p>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="/js/app.js"></script>
</body>
</html>
